name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: mypersonalwebsite/.nvmrc
          check-latest: true
          cache: "npm"
          cache-dependency-path: mypersonalwebsite/package-lock.json

      - name: Install dependencies
        working-directory: mypersonalwebsite
        run: npm ci

      - name: Audit dependencies
        working-directory: mypersonalwebsite
        run: npm audit --audit-level=moderate

      - name: Run tests
        working-directory: mypersonalwebsite
        run: npm test

      - name: Typecheck
        working-directory: mypersonalwebsite
        run: npm run typecheck

      - name: Build
        working-directory: mypersonalwebsite
        run: npm run build

      - name: Install Playwright browser
        working-directory: mypersonalwebsite
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: mypersonalwebsite
        run: npm run test:smoke

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: mypersonalwebsite/build
          retention-days: 7
