name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mypersonalwebsite/package-lock.json

      - name: Install dependencies
        working-directory: mypersonalwebsite
        run: npm ci

      - name: Run tests
        working-directory: mypersonalwebsite
        run: npm test

      - name: Build
        working-directory: mypersonalwebsite
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: mypersonalwebsite/build
          retention-days: 7
